<!DOCTYPE html>
<html>
<head>
  <title>Rohith Ghost Game 👻</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      text-align: center;
      font-family: Arial;
    }
    canvas {
      display: block;
      margin: auto;
      background: linear-gradient(#0f2027, #203a43, #2c5364);
    }
    #restartBtn {
      display: none;
      padding: 12px 25px;
      font-size: 18px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>
<button id="restartBtn">Restart 👻</button>

<audio id="jumpSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="hitSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="scoreSound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const restartBtn = document.getElementById("restartBtn");
const jumpSound = document.getElementById("jumpSound");
const hitSound = document.getElementById("hitSound");
const scoreSound = document.getElementById("scoreSound");

const playerImg = new Image();
playerImg.src = "me.jpg";

const pipeImg = new Image();
pipeImg.src = "model.jpg";

let gravity = 0.6;
let velocity;
let score;
let pipes;
let gameOver;
let playerY;

const playerX = 80;
const playerSize = 65;

function init() {
  velocity = 0;
  score = 0;
  pipes = [];
  gameOver = false;
  playerY = 250;
  restartBtn.style.display = "none";
}

function createPipe() {
  const gap = 180;
  const topHeight = Math.random() * 220 + 60;

  pipes.push({
    x: canvas.width,
    width: 90,
    top: topHeight,
    bottom: topHeight + gap,
    passed: false
  });
}

function drawPlayer() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(playerX + playerSize/2, playerY + playerSize/2, playerSize/2, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(playerImg, playerX, playerY, playerSize, playerSize);
  ctx.restore();
}

function update() {
  if (gameOver) return;

  velocity += gravity;
  playerY += velocity;

  // Ground / ceiling collision
  if (playerY < 0 || playerY + playerSize > canvas.height) {
    endGame();
  }

  pipes.forEach(pipe => {
    pipe.x -= 3;

    // Collision detection
    if (
      playerX + playerSize > pipe.x &&
      playerX < pipe.x + pipe.width &&
      (playerY < pipe.top || playerY + playerSize > pipe.bottom)
    ) {
      endGame();
    }

    // Score
    if (!pipe.passed && pipe.x + pipe.width < playerX) {
      pipe.passed = true;
      score++;
      scoreSound.play();
    }
  });

  pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

  if (Math.random() < 0.02) createPipe();
}

function drawPipes() {
  pipes.forEach(pipe => {
    // Top pipe
    ctx.drawImage(pipeImg, pipe.x, 0, pipe.width, pipe.top);

    // Bottom pipe
    ctx.drawImage(pipeImg, pipe.x, pipe.bottom, pipe.width, canvas.height - pipe.bottom);
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawPlayer();
  drawPipes();

  ctx.fillStyle = "white";
  ctx.font = "22px Arial";
  ctx.fillText("Score: " + score, 20, 40);

  if (gameOver) {
    ctx.fillText("GAME OVER 👻", 100, 300);
  }
}

function endGame() {
  if (!gameOver) hitSound.play();
  gameOver = true;
  restartBtn.style.display = "inline-block";
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function jump() {
  if (!gameOver) {
    velocity = -10;
    jumpSound.play();
  }
}

document.addEventListener("keydown", jump);
canvas.addEventListener("click", jump);

restartBtn.addEventListener("click", () => {
  init();
});

init();
gameLoop();
</script>

</body>
</html>
